instances:
  - name: test
    type: test
    props:
      test: test_value

components:
  trigger:
    - name: 20min
      type: fixed
      props:
        interval: 10s
  source:
    - type: system-file
      name: test
      props:
        path: test_value
    - type: vfs
      name: sync_downloader_case
      props:
        path: /sync_downloader_case
  item-file-resolver:
    - type: system-file
      name: test
  downloader:
    - type: http
      name: http
      props:
        download-path: /tmp
  file-mover:
    - type: system-file
      name: system-file

processors:
  - name: normal-case
    enabled: true
    save-path: test1
    source: system-file:test
    item-file-resolver: system-file:test
    downloader: http
    file-mover: system-file
  - name: sync_downloader_case
    enabled: true
    save-path: test1
    source: vfs:sync_downloader_case
    item-file-resolver: vfs
    downloader: vfs:sync_downloader_case
    file-mover: vfs
    category: test
    tags: [ "auto", "test" ]
    options:
      save-path-pattern: ""
      filename-pattern: ""
      variable-providers: [ ]
      #variable-name-replace:
      rename-task-interval: "15m"
      rename-times-threshold: 5
      parallelism: 1
      fetch-limit: 50
      pointer-batch-mode: true
      save-processing-content: true
      item-error-continue: true
      item-expression-exclusions: [ "item.title == 'filter.txt'" ]
      item-grouping:
        - expression-matching: "item.title == '1.txt'"
          save-path-pattern: "test001"
          variable-providers: [ ]
          item-expression-inclusions: [ ]
          item-expression-exclusions: [ ]
      file-grouping:
        - expression-matching: "file.path.contains('.ass')"
          filename-pattern: ""
          file-content-filters: [ ]
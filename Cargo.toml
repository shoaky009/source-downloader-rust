[workspace]
resolver = "3"
members = ["core", "sdk", "applications/web", "plugins/common", "component-macro", "storage-memory", "storage-sqlite"]

[workspace.dependencies]
log = "0.4"
env_logger = "0.11"

serde = { version = "1.0.219", features = ["derive"] }
serde_yaml = "0.9.34"
serde_json = "1.0"

http = "1"
time = "0.3"
libloading = "0.8"
syn = "2.0"
quote = "1.0"
tempfile = "3.19"
parking_lot = "0.12"

moka = { version = "0.12.10", features = ["sync"] }
axum = { version = "0.8.3", features = ["macros"] }
tokio = { version = "1.44.2", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
instances:
  - name: test
    type: test
    props:
      test: test_value

components:
  trigger:
    - name: 20min
      type: fixed
      props:
        interval: 10s
  source:
    - type: system-file
      name: test
      props:
        path: test_value

processors:
  - name: normal-case
    enabled: true
    save_path: test1
    source: system-file:test
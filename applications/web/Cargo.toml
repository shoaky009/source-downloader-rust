[package]
name = "web"
edition = "2024"

[lib]
path = "src/lib.rs"

[[bin]]
name = "web"
path = "src/main.rs"

[dependencies]
core = { path = "../../core" }
sdk = { path = "../../sdk" }
common = { path = "../../plugins/common" }
log = "0.4"
env_logger = "0.11"
axum = { version = "0.8.3", features = ["macros"] }
tokio = { version = "1.44.2", features = ["full"] }
serde = { version = "1.0.219", features = ["derive"] }
